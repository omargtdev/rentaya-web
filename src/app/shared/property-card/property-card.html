<a [routerLink]="['/properties', property.id]"
   class="block bg-white border border-gray-200 rounded-xl overflow-hidden hover:shadow-md transition-shadow group">
  <div class="relative h-40 bg-gray-100">
    <img [src]="property.photos[0]" [alt]="property.title" class="w-full h-full object-cover">
    <button
      (click)="toggleFavorite($event)"
      class="absolute top-2 right-2 w-8 h-8 rounded-full bg-white/90 flex items-center justify-center shadow-sm"
      [attr.aria-label]="isFavorite ? 'Quitar de favoritos' : 'Guardar en favoritos'"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5"
           [attr.fill]="isFavorite ? '#e11d48' : 'none'"
           [attr.stroke]="isFavorite ? '#e11d48' : '#9ca3af'" stroke-width="2">
        <path d="M12 21s-7.5-4.7-10-9.3C.5 8.1 2.3 4 6 4c2 0 3.4 1.1 6 3.6C14.6 5.1 16 4 18 4c3.7 0 5.5 4.1 4 7.7C19.5 16.3 12 21 12 21z"/>
      </svg>
    </button>
  </div>
  <div class="p-4">
    <h3 class="font-semibold text-gray-900 group-hover:text-primary-600 transition-colors">{{ property.title }}</h3>
    <p class="text-sm text-gray-500 mb-2">{{ property.district }} · {{ property.rooms }} hab. · {{ property.bathrooms }} baño</p>
    <p class="text-primary-600 font-bold">S/ {{ property.price | number }}</p>
  </div>
</a>
