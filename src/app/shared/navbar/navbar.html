<nav class="bg-white border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
    <a routerLink="/properties" class="text-xl font-bold text-primary-600">RentaYa</a>

    <div class="hidden sm:flex items-center gap-6 text-sm font-medium">
      <a routerLink="/properties" routerLinkActive="text-primary-600" [routerLinkActiveOptions]="{exact:true}"
         class="text-gray-600 hover:text-primary-600 transition-colors">Inmuebles</a>
      <a routerLink="/favorites" routerLinkActive="text-primary-600"
         class="text-gray-600 hover:text-primary-600 transition-colors">Favoritos</a>

      @if (currentUser().role === 'PROPIETARIO') {
        <a routerLink="/visits" routerLinkActive="text-primary-600"
           class="text-gray-600 hover:text-primary-600 transition-colors">Solicitudes</a>
      }

      <a routerLink="/messages" routerLinkActive="text-primary-600"
         class="text-gray-600 hover:text-primary-600 transition-colors">Mensajes</a>
    </div>

    <div class="flex items-center gap-3">
      <!-- Selector de rol solo para demo/mock: simula el usuario autenticado -->
      <select
        class="text-xs border border-gray-300 rounded-lg px-2 py-1.5 text-gray-600 bg-gray-50"
        (change)="onRoleChange($event)"
        [value]="currentUser().role"
        title="Simular rol de sesión (solo demo)"
      >
        <option value="INQUILINO">Inquilino: {{ currentUser().role === 'INQUILINO' ? currentUser().firstName : 'Ana' }}</option>
        <option value="PROPIETARIO">Propietario: {{ currentUser().role === 'PROPIETARIO' ? currentUser().firstName : 'Emir' }}</option>
      </select>

      <!-- Profile avatar + dropdown -->
      <div class="relative">
        <button
          id="profile-menu-btn"
          (click)="toggleProfileDropdown()"
          class="flex items-center gap-1.5 rounded-full hover:opacity-80 transition-opacity focus:outline-none"
          [attr.aria-expanded]="profileDropdownOpen()"
          aria-haspopup="true"
        >
          <div class="w-8 h-8 rounded-full bg-primary-100 text-primary-700 flex items-center justify-center text-xs font-semibold">
            {{ currentUser().firstName.charAt(0) }}{{ currentUser().lastName.charAt(0) }}
          </div>
          <svg class="w-3.5 h-3.5 text-gray-500 transition-transform"
            [class.rotate-180]="profileDropdownOpen()"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <!-- Dropdown menu -->
        @if (profileDropdownOpen()) {
          <div
            id="profile-dropdown"
            class="absolute right-0 mt-2 w-52 bg-white rounded-xl shadow-lg border border-gray-100 py-1 z-50 animate-fade-in"
          >
            <!-- User info -->
            <div class="px-4 py-3 border-b border-gray-100">
              <p class="text-sm font-semibold text-gray-900 truncate">
                {{ currentUser().firstName }} {{ currentUser().lastName }}
              </p>
              <p class="text-xs text-gray-500 truncate">{{ currentUser().email }}</p>
            </div>

            <!-- Menu items -->
            <button
              id="btn-goto-profile"
              (click)="goToProfile()"
              class="w-full text-left flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors"
            >
              <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              Perfil
            </button>

            <div class="border-t border-gray-100 mt-1">
              <button
                id="btn-logout"
                (click)="logout()"
                class="w-full text-left flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors"
              >
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Cerrar sesión
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</nav>
