<div class="fixed inset-0 bg-black/40 flex items-center justify-center px-4 z-50" (click)="close()">
  <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6" (click)="$event.stopPropagation()">
    <h3 class="text-lg font-bold text-gray-900 mb-1">Solicitar visita</h3>
    <p class="text-sm text-gray-500 mb-4">{{ propertyTitle }}</p>

    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de visita *</label>
    <input
      type="date"
      [min]="today"
      [(ngModel)]="selectedDate"
      class="w-full border border-gray-300 rounded-lg px-3 py-2 mb-4 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none"
    >

    <label class="block text-sm font-medium text-gray-700 mb-2">Horarios disponibles (8:00 a.m. - 7:00 p.m.)</label>
    <div class="grid grid-cols-4 gap-2 mb-4">
      @for (slot of slots; track slot) {
        <button
          type="button"
          (click)="selectSlot(slot)"
          class="text-sm py-2 rounded-lg border transition-colors"
          [class.bg-primary-600]="selectedTime === slot"
          [class.text-white]="selectedTime === slot"
          [class.border-primary-600]="selectedTime === slot"
          [class.bg-white]="selectedTime !== slot"
          [class.border-gray-300]="selectedTime !== slot"
          [class.text-gray-700]="selectedTime !== slot"
        >
          {{ slot }}
        </button>
      }
    </div>

    @if (errorMessage) {
      <div class="bg-danger-50 border border-danger-600 text-danger-700 text-sm rounded-lg px-3 py-2 mb-4">
        {{ errorMessage }}
      </div>
    }

    <p class="text-xs text-gray-400 mb-4">Reglas: fecha futura y máximo 1 solicitud pendiente por propiedad.</p>

    <div class="flex gap-3">
      <button
        type="button"
        (click)="close()"
        class="flex-1 border border-gray-300 text-gray-700 rounded-lg py-2 font-medium hover:bg-gray-50 transition-colors"
      >
        Cancelar
      </button>
      <button
        type="button"
        (click)="confirm()"
        [disabled]="!selectedDate || !selectedTime || submitting"
        class="flex-1 bg-primary-600 hover:bg-primary-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-lg py-2 font-semibold transition-colors"
      >
        {{ submitting ? 'Enviando...' : 'Confirmar solicitud' }}
      </button>
    </div>
  </div>
</div>
